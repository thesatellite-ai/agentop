name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build (pure Go, no CGO)
        env:
          CGO_ENABLED: "0"
        run: go build -o /tmp/agentop .

      - name: go test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: cross-compile (darwin + linux, arm64 + amd64)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: build --snapshot --clean
