version: '3'

vars:
  BIN: bin/agentop

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the agentop binary into ./bin (CGO-free, static)
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o {{.BIN}} .

  run:
    desc: Build and run the TUI
    deps: [build]
    cmds:
      - ./{{.BIN}}

  list:
    desc: Build and run one-shot list mode
    deps: [build]
    cmds:
      - ./{{.BIN}} list

  install:
    desc: go install agentop to GOBIN
    cmds:
      - go install .

  tidy:
    desc: Tidy and verify go modules
    cmds:
      - go mod tidy
      - go mod verify

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  cover:
    desc: Run tests with per-package coverage
    cmds:
      - go test ./... -cover

  fmt:
    desc: Format Go source
    cmds:
      - gofmt -w .

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  snapshot:
    desc: Build a local goreleaser snapshot (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Cut a release with goreleaser (requires a git tag + tokens)
    cmds:
      - goreleaser release --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin dist
